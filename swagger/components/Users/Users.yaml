paths:
  /auth/register:
    post:
      operationId: registerUser
      summary: Register a new user
      tags: [Users]
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/RegisterRequest"
      responses:
        201:
          description: User registered successfully
          schema:
            $ref: "#/definitions/AuthResponse"
        400:
          description: Validation error
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      summary: Login user
      tags: [Users]
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/LoginRequest"
      responses:
        200:
          description: Login successful
          schema:
            $ref: "#/definitions/AuthResponse"
        401:
          description: Invalid credentials
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      summary: Logout user
      tags: [Users]
      responses:
        200:
          description: Logout successful
          schema:
            $ref: "#/definitions/SuccessResponse"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/ErrorResponse"
  

  /users/me:
    get:
      operationId: getUserProfile
      summary: Get logged-in user profile
      tags: [Users]
      produces:
        - application/json
      security:
        - bearerAuth: []
      responses:
        200:
          description: User profile details
          schema:
            $ref: "#/definitions/User"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/ErrorResponse"

    put:
      operationId: updateUserProfile
      summary: Update logged-in user profile
      tags: [Users]
      consumes:
        - application/json
      produces:
        - application/json
      security:
        - bearerAuth: []
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/UserUpdateRequest"
      responses:
        200:
          description: Profile updated successfully
          schema:
            $ref: "#/definitions/User"
        400:
          description: Validation error
          schema:
            $ref: "#/definitions/ErrorResponse"
        401:
          description: Unauthorized
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: requestPasswordReset
      summary: Request password reset
      tags: [Users]
      consumes:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/ForgotPasswordRequest"
      responses:
        200:
          description: Password reset email sent
        400:
          description: Invalid email
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      summary: Reset password
      tags: [Users]
      consumes:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/ResetPasswordRequest"
      responses:
        200:
          description: Password reset successful
        400:
          description: Invalid or expired token
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/refresh-token:
    post:
      operationId: refreshToken
      summary: Refresh authentication token
      tags: [Users]
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/RefreshTokenRequest"
      responses:
        200:
          description: Token refreshed successfully
          schema:
            $ref: "#/definitions/AuthResponse"
        400:
          description: Invalid refresh token
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgetPassword
      tags: [Users]
      summary: Request password reset
      description: Sends a reset password link to the user's email
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required:
              - email
            properties:
              email:
                type: string
                example: user@example.com
      responses:
        200:
          description: Reset link sent (if email exists)
          schema:
            type: object
            properties:
              message:
                type: string
                example: If the email exists, a reset link has been sent
        400:
          description: Invalid refresh token
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/identify:
    post:
      operationId: identifyUser
      tags: [Users]
      summary: Identify user by email or phone
      description: Determines whether a user exists and their verification status
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            type: object
            required:
              - identifier
            properties:
              identifier:
                type: string
                example: "user@example.com"
      responses:
        200:
          description: Identification result
        400:
          description: Invalid identifier
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/otp/send:
    post:
      operationId: OTPLogin
      summary: Send OTP to email or phone
      tags: [Users]
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/SendOTPRequest'
      responses:
        "200":
          description: OTP sent response
          schema:
            $ref: '#/definitions/GenericResponse'
        "400":
          description: Invalid identifier
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/otp/verify:
    post:
      operationId: VerifyOTP
      summary: Verify OTP and login user
      tags: [Users]
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: '#/definitions/VerifyOTPRequest'
      responses:
        "200":
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/definitions/VerifyOTPResponse'
        "401":
          description: Invalid OTP
          schema:
            $ref: "#/definitions/ErrorResponse"

  /auth/otp/resend:
    post:
      summary: Resend OTP
      tags: [Users]
      consumes:
        - application/json
      produces:
        - application/json
      parameters:
        - in: body
          name: body
          required: true
          schema:
              $ref: '#/definitions/SendOTPRequest'
      responses:
        "200":
          description: OTP resent
          content:
            application/json:
              schema:
                $ref: '#/definitions/GenericResponse'
